branch:
  main:
    environment: form-app-env
    group_suffix: null

global:
  application_name: form-app
  default_region: us-east-1
  default_ec2_keyname: null
  default_platform: Python 3.11 running on 64bit Amazon Linux 2
  default_instance_profile: aws-elasticbeanstalk-ec2-role
  instance_profile: null
  platform_name: null
  platform_version: null
  sc: git
  workspace_type: Application

# Configure deployment settings below:
# - Change 'form-app-env' to your desired environment name
# - Set default_ec2_keyname to your EC2 key pair name (optional)
# - Change default_region if needed (us-east-1, us-west-2, eu-west-1, etc.)
